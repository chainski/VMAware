name: Build

on:
  push:
    branches: ["main"]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'
      - '.github/workflows/build.yml'
      - '.github/workflows/*.bat'
      - 'CMakeLists.txt'
  pull_request:
    branches: ["main"]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'
      - '.github/workflows/build.yml'
      - '.github/workflows/*.bat'
      - 'CMakeLists.txt'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            image: debian:bookworm
          - arch: arm64
            platform: linux/arm64
            image: debian:bookworm
          - arch: armhf
            platform: linux/arm/v7
            image: debian:bookworm
          - arch: armel
            platform: linux/arm/v6
            image: debian:bookworm
          - arch: i386
            platform: linux/386
            image: debian:bookworm
          - arch: mips64el
            platform: linux/mips64le
            image: debian:bookworm
          - arch: ppc64el
            platform: linux/ppc64le
            image: debian:bookworm
          - arch: riscv64
            platform: linux/riscv64
            image: debian:sid
          - arch: s390x
            platform: linux/s390x
            image: debian:bookworm

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build (${{ matrix.arch }})
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/src \
            -w /src \
            ${{ matrix.image }} \
            bash -c "
              apt-get update -q &&
              apt-get install -y --no-install-recommends cmake g++ build-essential &&
              cmake -B build -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build --config Release
            "

      - name: Run binary (${{ matrix.arch }})
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/src \
            -w /src \
            ${{ matrix.image }} \
            ./build/vmaware

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmaware-linux-${{ matrix.arch }}
          path: build/vmaware
          if-no-files-found: error
          retention-days: 30

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Dev_Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run binary
        run: build/vmaware

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmaware-macos-aarch64
          path: build/vmaware
          if-no-files-found: error
          retention-days: 30

  windows-64-debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmd.exe /c .github\workflows\build_run_win_64_debug.bat
      - name: Rename binary with commit info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0,12)
          $run = "${{ github.run_number }}"
          Add-Content $env:GITHUB_ENV "SHORT_SHA=$shortSha"
          Rename-Item build\Release\vmaware.exe "vmaware_${run}_${shortSha}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: vmaware64_debug.exe
          path: build\Release\vmaware_${{ github.run_number }}_${{ env.SHORT_SHA }}.exe

  windows-32-debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmd.exe /c .github\workflows\build_run_win_32_debug.bat
      - name: Rename binary with commit info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0,12)
          $run = "${{ github.run_number }}"
          Add-Content $env:GITHUB_ENV "SHORT_SHA=$shortSha"
          Rename-Item build\Release\vmaware.exe "vmaware_${run}_${shortSha}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: vmaware32_debug.exe
          path: build\Release\vmaware_${{ github.run_number }}_${{ env.SHORT_SHA }}.exe

  windows-32-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmd.exe /c .github\workflows\build_run_win_32_release.bat
      - name: Rename binary with commit info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0,12)
          $run = "${{ github.run_number }}"
          Add-Content $env:GITHUB_ENV "SHORT_SHA=$shortSha"
          Rename-Item build\Release\vmaware.exe "vmaware_${run}_${shortSha}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: vmaware32_release.exe
          path: build\Release\vmaware_${{ github.run_number }}_${{ env.SHORT_SHA }}.exe

  windows-64-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmd.exe /c .github\workflows\build_run_win_64_release.bat
      - name: Rename binary with commit info
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0,12)
          $run = "${{ github.run_number }}"
          Add-Content $env:GITHUB_ENV "SHORT_SHA=$shortSha"
          Rename-Item build\Release\vmaware.exe "vmaware_${run}_${shortSha}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: vmaware64_release.exe
          path: build\Release\vmaware_${{ github.run_number }}_${{ env.SHORT_SHA }}.exe

  all-platforms:
    needs: [linux, macos, windows-64-debug, windows-32-debug, windows-32-release, windows-64-release]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All platforms built successfully"
